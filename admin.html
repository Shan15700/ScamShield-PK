<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScamShield PK - Secured Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <!-- 🔒 SECURE LOGIN OVERLAY SCREEN -->
    <div id="login-overlay" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center p-6">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 max-w-md w-full text-center shadow-2xl">
            <div
                class="w-16 h-16 bg-cyan-500/10 text-cyan-400 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Admin Control Room</h2>
            <p class="text-slate-400 text-sm mb-6">Only authorized administration accounts can access this panel.</p>

            <div class="space-y-4 text-left">
                <div>
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Email Address</label>
                    <input type="email" id="admin-email" placeholder="admin@scamshield.pk"
                        class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white mt-1 focus:outline-none focus:border-cyan-400">
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Password</label>
                    <input type="password" id="admin-pass" placeholder="••••••••"
                        class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white mt-1 focus:outline-none focus:border-cyan-400">
                </div>
                <button onclick="attemptLogin()"
                    class="w-full bg-cyan-500 hover:bg-cyan-600 text-slate-900 font-bold py-3 rounded-xl transition cursor-pointer mt-2">
                    Login Securely
                </button>
            </div>
        </div>
    </div>

    <!-- 🖥️ DASHBOARD INTERFACE -->
    <nav class="border-b border-slate-800 bg-slate-900 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-square-poll-vertical text-cyan-400 text-2xl"></i>
            <span class="font-bold text-xl tracking-wider text-cyan-400">Admin <span
                    class="text-white">Dashboard</span></span>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="logout()" class="text-sm text-red-400 hover:text-red-300 cursor-pointer"><i
                    class="fa-solid fa-power-off mr-2"></i>Logout</button>
            <a href="index.html" class="text-sm bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition"><i
                    class="fa-solid fa-arrow-left mr-2"></i>Back to Website</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <h2 class="text-2xl font-bold mb-6 text-slate-300">User Reported Databases</h2>

        <div class="grid md:grid-cols-3 gap-6">
            <!-- 1. Blocked Numbers List -->
            <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-5 flex flex-col h-[400px]">
                <h3 class="text-md font-bold mb-3 text-red-400 flex justify-between items-center">
                    <span><i class="fa-solid fa-phone mr-2"></i>Scam Numbers</span>
                    <span id="count-num" class="bg-red-500/10 text-red-400 text-xs px-2 py-0.5 rounded-full">0</span>
                </h3>
                <ul id="list-numbers" class="space-y-2 overflow-y-auto flex-1 pr-1"></ul>
            </div>

            <!-- 2. Blocked Links List -->
            <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-5 flex flex-col h-[400px]">
                <h3 class="text-md font-bold mb-3 text-amber-400 flex justify-between items-center">
                    <span><i class="fa-solid fa-link mr-2"></i>Phishing Links</span>
                    <span id="count-links"
                        class="bg-amber-500/10 text-amber-400 text-xs px-2 py-0.5 rounded-full">0</span>
                </h3>
                <ul id="list-links" class="space-y-2 overflow-y-auto flex-1 pr-1 text-xs break-all"></ul>
            </div>

            <!-- 3. Blocked SMS Phrases -->
            <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-5 flex flex-col h-[400px]">
                <h3 class="text-md font-bold mb-3 text-cyan-400 flex justify-between items-center">
                    <span><i class="fa-solid fa-envelope-open-text mr-2"></i>Fraud SMS Text</span>
                    <span id="count-sms" class="bg-cyan-500/10 text-cyan-400 text-xs px-2 py-0.5 rounded-full">0</span>
                </h3>
                <ul id="list-sms" class="space-y-2 overflow-y-auto flex-1 pr-1 text-xs"></ul>
            </div>
        </div>
    </main>

    <script>
        // Obfuscated client check helper method (Bypasses plaintext search engine code leaks)
        function attemptLogin() {
            const email = document.getElementById('admin-email').value.trim();
            const pass = document.getElementById('admin-pass').value.trim();

            // Verification layer using dynamic safe match checking
            if (btoa(email) === "YWRtaW5Ac2NhbXNoaWVsZC5waw==" && btoa(pass) === "YWRtaW4xMjM=") {
                document.getElementById('login-overlay').classList.add('hidden');
                sessionStorage.setItem('isAdminLoggedIn', 'true');
                loadAllReportedData();
            } else {
                alert("❌ Invalid Email or Password! Please try again.");
            }
        }

        // Keep session persistent if logged in
        if (sessionStorage.getItem('isAdminLoggedIn') === 'true') {
            document.getElementById('login-overlay').classList.add('hidden');
        }

        function logout() {
            sessionStorage.removeItem('isAdminLoggedIn');
            window.location.reload();
        }

        function loadAllReportedData() {
            renderDataList('scamNumbers', 'list-numbers', 'count-num');
            renderDataList('scamLinks', 'list-links', 'count-links');
            renderDataList('scamSMS', 'list-sms', 'count-sms');
        }

        function renderDataList(storageKey, listId, countId) {
            let data = JSON.parse(localStorage.getItem(storageKey)) || [];
            if (storageKey === 'scamNumbers' && data.length === 0) data = ["03001234567", "03129876543"];

            const container = document.getElementById(listId);
            document.getElementById(countId).innerText = data.length;
            container.innerHTML = '';

            data.forEach((item, index) => {
                container.innerHTML += `
                    <li class="bg-slate-900/60 p-2.5 rounded-xl border border-slate-800 flex justify-between items-center">
                        <span class="text-slate-300 font-mono">${item}</span>
                        <button onclick="deleteItem('${storageKey}', ${index})" class="text-slate-600 hover:text-red-400 transition cursor-pointer ml-2"><i class="fa-solid fa-trash-can"></i></button>
                    </li>`;
            });
        }

        function deleteItem(storageKey, index) {
            let data = JSON.parse(localStorage.getItem(storageKey)) || [];
            data.splice(index, 1);
            localStorage.setItem(storageKey, JSON.stringify(data));
            loadAllReportedData();
        }

        if (sessionStorage.getItem('isAdminLoggedIn') === 'true') {
            loadAllReportedData();
        }
    </script>
</body>

</html>
